# The autonomous discovery plan. Keep mechanisms explicit and cadences bounded.
# `run-scheduled` evaluates this file; the web UI exposes it read-only.
timezone: America/Chicago
daily_limits:
  max_new_channels_to_audit: 3
  channel_sample_size: 12
  fetch_channel_transcripts: true
  hermes_timeout_seconds: 90
  max_hermes_per_query: 2
  max_backfill_videos_per_run: 10
  max_recovery_videos_per_run: 2
  metadata_screen_batch_size: 20
  max_metadata_screen_videos_per_query: 20
  max_metadata_screen_videos_per_backfill: 40
queries:
  - id: day-trading
    query: "day trading"
    cadence: daily
    upload_date: week
    max_results: 20
    intent: broad intraday setup discovery
  - id: vwap-trading
    query: "VWAP trading"
    cadence: daily
    upload_date: week
    max_results: 20
    intent: price-reference and volume-weighted setup discovery
  - id: swing-trading
    query: "swing trading"
    cadence: daily
    upload_date: week
    max_results: 20
    intent: multi-day setup discovery
  - id: technical-analysis
    query: "technical analysis"
    cadence: daily
    upload_date: week
    max_results: 20
    intent: broad chart-based mechanism discovery
  - id: trading-indicators
    query: "trading indicators"
    cadence: daily
    upload_date: week
    max_results: 20
    intent: indicator and filter discovery
  # Broad daily discovery expands the idea surface beyond named mechanisms.
  # The ranked extraction budget, not search cadence, keeps Hermes bounded.
  - id: broad-stock-trading
    query: "stock trading"
    cadence: daily
    upload_date: week
    max_results: 20
    intent: broad stock-market trading discovery
  - id: broad-trading-strategy
    query: "trading strategy"
    cadence: daily
    upload_date: week
    max_results: 20
    intent: broad rules-based strategy discovery
  - id: broad-price-action
    query: "price action trading"
    cadence: daily
    upload_date: week
    max_results: 20
    intent: discretionary-mechanism discovery for later rule formalization
  - id: broad-algorithmic-trading
    query: "algorithmic trading"
    cadence: daily
    upload_date: week
    max_results: 20
    intent: systematic trading research and implementation discovery
  - id: broad-quant-trading
    query: "quantitative trading"
    cadence: daily
    upload_date: week
    max_results: 20
    intent: quantitative signal and portfolio research discovery
  - id: broad-ai-trading
    query: "AI trading"
    cadence: daily
    upload_date: week
    max_results: 20
    intent: machine-learning and AI-assisted trading research discovery
  - id: trading-systems
    query: "trading systems"
    cadence: daily
    upload_date: week
    max_results: 20
    intent: rules-based system and process discovery
  - id: trading-backtesting
    query: "trading backtesting"
    cadence: daily
    upload_date: week
    max_results: 20
    intent: testable strategy and research-method discovery
