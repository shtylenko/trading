name: eval_2023_broad
description: Regime-diversity evaluation over 2023 (choppy year) on the rule-based liquid PIT universe.
universe: liquid_pit
universe_policy: point_in_time
candidate_limit: 10
date_ranges:
  - start: "2023-01-03"
    end: "2023-12-29"
    label: y2023_eval
    role: eval
notes: >
  REGIME DIVERSITY with two caveats: (1) run with O03_DISABLE_ML=1 — the
  lgbm_orb_v2 model was trained on 2024, which is the future relative to
  these dates; RV ranking only. (2) The universe is built from Alpaca's
  current asset list, so since-delisted names are missing (survivorship
  bias) — treat results as upper bounds.
