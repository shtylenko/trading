name: eval_2022_broad
description: Regime-diversity evaluation over 2022 (bear year) on the rule-based liquid PIT universe.
universe: liquid_pit
universe_policy: point_in_time
candidate_limit: 10
date_ranges:
  - start: "2022-01-03"
    end: "2022-12-30"
    label: y2022_eval
    role: eval
notes: >
  REGIME DIVERSITY (bear market) with the same two caveats as
  eval_2023_broad: run with O03_DISABLE_ML=1 (model look-ahead otherwise),
  and survivorship bias in the universe makes results upper bounds.
